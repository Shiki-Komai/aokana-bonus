<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SDB Gateway</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1118;
      --panel: #0f1b2a;
      --accent: #f04d3a;
      --text: #e6edf6;
      --muted: #9aa7b6;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(700px 400px at 50% 20%, rgba(255,255,255,0.05), transparent), var(--bg);
      color: var(--text);
      font-family: "IBM Plex Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    }
    .wrap {
      width: min(520px, 90vw);
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(240, 77, 58, 0.2), rgba(12, 18, 28, 0.9));
      display: grid;
      place-items: center;
      font-weight: 700;
      letter-spacing: 3px;
      margin: 0 auto 16px;
    }
    .title {
      font-size: 18px;
      letter-spacing: 4px;
      margin: 0 0 10px;
    }
    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 2px;
    }
    .bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }
    .bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--accent), #ff7a5b);
      transform: translateX(-100%);
      animation: load 3s linear forwards;
    }
    .note {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
    }
    @keyframes load {
      to { transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">SDB</div>
    <h1 class="title">SDB GATEWAY</h1>
    <p class="subtitle">Initializing Secure Session</p>
    <div class="bar" aria-hidden="true"></div>
    <div class="note">Redirecting in 3 seconds...</div>
  </div>

  <script>
    setTimeout(() => {
      window.location.replace('sdb_server.html');
    }, 3000);
  </script>
</body>
</html>
